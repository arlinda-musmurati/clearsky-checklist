<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClearSky — Walkthrough Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --off-white: #f7f6f4;
    --gray-100: #f0efed;
    --gray-200: #e2e0dd;
    --gray-400: #9e9b96;
    --gray-600: #5a5753;
    --gray-800: #2e2c2a;
    --pass: #1a6b3c;
    --pass-bg: #f0f7f3;
    --pass-border: #a8d5bc;
    --flag: #b83232;
    --flag-bg: #fdf2f2;
    --flag-border: #e8b0b0;
    --accent: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--black);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 4px;
    margin-bottom: 6px;
  }
  .logo-clear {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 21px;
    color: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: inline-block;
    transform: scaleY(1.15);
    transform-origin: center;
  }
  .logo-sky {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 21px;
    color: var(--black);
    background: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 5px 2px 5px;
    margin-left: 2px;
    display: inline-block;
    transform: scaleY(1.15);
    transform-origin: center;
  }
  .logo-sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 6.5px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    display: block;
  }
  .logo-wrap { display: flex; flex-direction: column; }

  .progress-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .progress-bar-outer {
    width: 140px;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--white);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Property Card ── */
  .property-card {
    max-width: 760px;
    margin: 28px auto 0;
    padding: 0 16px;
  }
  .property-inner {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 32px;
  }
  .prop-field label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray-400);
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .prop-field input {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--gray-200);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gray-800);
    padding: 4px 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .prop-field input:focus { border-color: var(--black); }
  .prop-field .static-val {
    font-size: 14px;
    color: var(--gray-800);
    font-weight: 500;
    padding: 4px 0;
    border-bottom: 1px solid var(--gray-100);
  }

  /* ── Main ── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ── Section ── */
  .section {
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--gray-200);
    background: var(--white);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.10s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.20s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.30s; }

  .section-header {
    background: var(--black);
    color: var(--white);
    padding: 13px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .section-count {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: 1px;
  }

  /* ── Item ── */
  .item {
    border-bottom: 1px solid var(--gray-100);
    transition: background 0.15s;
  }
  .item:last-child { border-bottom: none; }
  .item-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px 12px;
    cursor: pointer;
    user-select: none;
  }
  .item-top:hover { background: var(--gray-100); }

  /* Status toggle */
  .status-btn {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
    font-size: 14px;
  }
  .item.pass .status-btn {
    background: var(--pass);
    border-color: var(--pass);
    color: white;
  }
  .item.flag .status-btn {
    background: var(--flag);
    border-color: var(--flag);
    color: white;
  }
  .item.pass { background: var(--pass-bg); }
  .item.flag { background: var(--flag-bg); }

  .item-content { flex: 1; }
  .item-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-800);
    line-height: 1.4;
  }
  .item.pass .item-label { color: var(--pass); }
  .item.flag .item-label { color: var(--flag); }
  .item-desc {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 2px;
    line-height: 1.4;
  }

  .item-actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .btn-pass, .btn-flag, .btn-clear {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .btn-pass  { color: var(--pass); border-color: var(--pass-border); background: var(--pass-bg); }
  .btn-flag  { color: var(--flag); border-color: var(--flag-border); background: var(--flag-bg); }
  .btn-clear { color: var(--gray-400); border-color: var(--gray-200); background: var(--white); }
  .btn-pass:hover  { background: var(--pass); color: white; }
  .btn-flag:hover  { background: var(--flag); color: white; }
  .btn-clear:hover { background: var(--gray-200); }

  .item-note-wrap {
    padding: 0 20px 14px 60px;
    display: none;
  }
  .item-note-wrap.show { display: block; }
  .item-note-wrap textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--gray-800);
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    min-height: 70px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .item-note-wrap textarea:focus { border-color: var(--black); }
  .item-note-wrap textarea::placeholder { color: var(--gray-400); }

  .tag-input {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--gray-800);
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 8px 12px;
    outline: none;
    margin-top: 8px;
    transition: border-color 0.2s;
  }
  .tag-input:focus { border-color: var(--black); }
  .tag-input::placeholder { color: var(--gray-400); }

  /* toggle note link */
  .note-toggle {
    font-size: 11px;
    color: var(--gray-400);
    cursor: pointer;
    margin-top: 6px;
    display: inline-block;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .note-toggle:hover { color: var(--black); }

  /* ── Summary Bar ── */
  .summary-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--black);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 200;
  }
  .summary-counts {
    display: flex;
    gap: 20px;
  }
  .sum-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .sum-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .sum-dot.pass { background: #4caf7d; }
  .sum-dot.flag { background: #e57373; }
  .sum-dot.empty { background: var(--gray-600); }
  .sum-label { color: var(--gray-400); font-size: 12px; }
  .sum-num   { color: var(--white); font-weight: 700; }

  /* ── Photos ── */
  .note-actions {
    display: flex;
    gap: 14px;
    margin-top: 6px;
    align-items: center;
  }
  .photo-toggle {
    font-size: 11px;
    color: var(--gray-400);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .photo-toggle:hover { color: var(--black); }
  .photo-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .photo-thumb {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--gray-200);
  }
  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: pointer;
  }
  .photo-del {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .photo-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 600;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .photo-overlay.show { display: flex; }
  .photo-overlay img {
    max-width: 90%;
    max-height: 78vh;
    border-radius: 8px;
    object-fit: contain;
  }
  .photo-overlay-close {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
  }
  .photo-download-btn {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    background: var(--white);
    border-radius: 8px;
    padding: 10px 24px;
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
  }
  .photo-download-btn:hover { opacity: 0.85; }
  @media print {
    .photo-grid { display: flex !important; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .photo-thumb { width: 180px !important; height: 180px !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .photo-del { display: none !important; }
    .note-actions { display: none !important; }
    .photo-overlay { display: none !important; }
  }

  .btn-pdf {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    background: transparent;
    color: var(--white);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 10px 22px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-pdf:hover { border-color: white; background: rgba(255,255,255,0.1); }

  .btn-email {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    background: transparent;
    color: var(--white);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 10px 22px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-email:hover { border-color: white; background: rgba(255,255,255,0.1); }
  .btn-email:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-submit {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    background: var(--white);
    color: var(--black);
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-submit:hover { opacity: 0.85; }

  /* ── Report Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    animation: popIn 0.25s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--black);
  }
  .modal-close {
    font-size: 22px;
    cursor: pointer;
    color: var(--gray-400);
    background: none;
    border: none;
    line-height: 1;
    padding: 0 4px;
  }
  .modal-close:hover { color: var(--black); }
  .report-section { margin-bottom: 20px; }
  .report-section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-400);
    font-weight: 700;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--gray-100);
  }
  .report-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    font-size: 13.5px;
    border-bottom: 1px solid var(--gray-100);
  }
  .report-item:last-child { border-bottom: none; }
  .report-status {
    font-size: 13px;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
    margin-top: 1px;
  }
  .report-item-label { font-weight: 500; color: var(--gray-800); }
  .report-item-note  { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .report-empty { color: var(--gray-400); font-size: 13px; font-style: italic; padding: 6px 0; }

  .report-photo-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }
  .report-photo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .report-photo {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--gray-200);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .report-photo:hover { opacity: 0.85; }
  .report-photo-dl {
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: var(--gray-600);
    text-decoration: none;
    border: 1px solid var(--gray-200);
    border-radius: 20px;
    padding: 3px 10px;
    transition: all 0.15s;
  }
  .report-photo-dl:hover { background: var(--black); color: white; border-color: var(--black); }

  @media print {
    .report-photo { width: 220px !important; height: 220px !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .report-photo-dl { display: none !important; }
    .report-photo:hover { opacity: 1; }
  }

  .btn-print {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.2s;
  }
  .btn-print:hover { opacity: 0.8; }

  .email-status {
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }
  .email-status.show { display: block; }
  .email-status.ok { color: var(--pass); }
  .email-status.err { color: var(--flag); }

  /* ── Global toast (always visible, regardless of modal state) ── */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 74px;
    transform: translateX(-50%) translateY(20px);
    max-width: 90%;
    width: 420px;
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.4;
    padding: 14px 18px;
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .toast.ok { border-left: 4px solid var(--pass); }
  .toast.err { border-left: 4px solid var(--flag); }
  @media print { .toast { display: none !important; } }

  /* ── Signature Section ── */
  .signature-section {
    max-width: 760px;
    margin: 0 auto 100px;
    padding: 0 16px;
  }
  .signature-inner {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    padding: 28px 28px 32px;
  }
  .sig-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-800);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--gray-100);
  }
  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 32px;
  }
  .sig-field label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray-400);
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .sig-field input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gray-800);
    padding: 4px 0;
    outline: none;
    margin-bottom: 32px;
  }
  .sig-line {
    border-bottom: 1.5px solid var(--gray-800);
    margin-bottom: 8px;
  }
  .sig-label {
    font-size: 10px;
    color: var(--gray-400);
    letter-spacing: 0.5px;
  }

  @media (max-width: 520px) {
    .sig-grid { grid-template-columns: 1fr; gap: 24px; }
    .property-inner { grid-template-columns: 1fr; }
    .summary-counts { gap: 12px; }
    .modal { padding: 20px; }

    .summary-bar {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 8px;
      justify-content: center;
    }
    .summary-counts {
      order: -1;
      width: 100%;
      justify-content: center;
    }
    .btn-pdf, .btn-email, .btn-submit {
      flex: 1 1 0;
      text-align: center;
      padding: 10px 6px;
      font-size: 11.5px;
      white-space: normal;
    }
    .toast { bottom: 96px; width: 92%; }
  }

  @media (max-width: 380px) {
    .btn-pdf, .btn-email, .btn-submit { font-size: 10.5px; padding: 9px 4px; }
  }

  @media print {
    @page { margin: 1cm; }
    header { position: relative; box-shadow: none; background: #0a0a0a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

</script>

<script>
const SECTIONS = [
  {
    title: "1. Kitchen & Appliances",
    items: [
      { id:"fridge",   label:"Refrigerator & Freezer",     desc:"Cooling properly, interior light on, no persistent odors" },
      { id:"stove",    label:"Stove & Oven",                desc:"All burners ignite/heat; oven element and interior light functional" },
      { id:"dishwash", label:"Dishwasher",                  desc:"Racks undamaged, no standing water at bottom" },
      { id:"micro",    label:"Microwave",                   desc:"Turntable rotates, interior light functions" },
      { id:"cabinets", label:"Kitchen Cabinets",            desc:"Open and close smoothly, no damage" },
      { id:"ksink",    label:"Kitchen Sink & Drain",        desc:"Hot water present, drain flows freely and unobstructed" },
    ]
  },
  {
    title: "2. Plumbing & Moisture",
    items: [
      { id:"wpressure",label:"Water Pressure",              desc:"Run shower and sink together; check for significant drop" },
      { id:"drainage", label:"Drainage – All Areas",        desc:"Fill sinks and tub; confirm fast, unobstructed drain flow" },
      { id:"leaks",    label:"Leaks & Moisture",            desc:"Check under-sink cabinets for dampness, stains, or mold" },
      { id:"faucets",  label:"Faucets – Hot Water",         desc:"Both bathrooms and kitchen have hot water" },
      { id:"shower",   label:"Shower",                      desc:"Switch between tub and shower modes; both functional" },
      { id:"toilets",  label:"Toilets",                     desc:"Flush every toilet; no continuous running, no leaks at base" },
    ]
  },
  {
    title: "3. Electrical & HVAC",
    items: [
      { id:"outlets",  label:"Outlets",                     desc:"Test every outlet in each room with a phone charger" },
      { id:"switches", label:"Light Switches",              desc:"Toggle all switches; listen for buzzing or flickering" },
      { id:"bulbs",    label:"Lights / Bulbs",              desc:"All lights working, no bulbs out" },
      { id:"hvac",     label:"Heating & Cooling (HVAC/AC)", desc:"Run both AC and Heat cycles; confirm strong airflow" },
    ]
  },
  {
    title: "4. Windows & Doors",
    items: [
      { id:"windows",  label:"Windows",                     desc:"Open/close every window; locks secure, no drafts, no water damage" },
      { id:"doors",    label:"Doors",                       desc:"All doors swing freely, no floor rubbing, locks functional" },
    ]
  },
  {
    title: "5. Walls, Floors & General Condition",
    items: [
      { id:"walls",    label:"Walls – Holes & Damage",      desc:"Inspect for holes larger than a nail; note unpatched areas" },
      { id:"caulk",   label:"Caulking",                    desc:"Not deteriorating; intact around tubs, sinks, and windows" },
      { id:"floors",   label:"Floor Condition",             desc:"No water damage, no loose floorboards, no deep scratches" },
    ]
  },
  {
    title: "6. Laundry & Additional Systems",
    items: [
      { id:"washer",   label:"Washing Machine",             desc:"Check condition and confirm it is operational" },
      { id:"dryer",    label:"Dryer",                       desc:"Check condition and confirm it is operational" },
    ]
  }
];

const TOTAL = SECTIONS.reduce((a,s) => a + s.items.length, 0);
const state = {}; // id -> { status: 'pass'|'flag'|'empty', note: '' }
SECTIONS.forEach(s => s.items.forEach(it => {
  state[it.id] = { status: 'empty', note: '' };
}));

// ── Appliance data tags: model/serial number recorded off the manufacturer's
// data plate for each major appliance, plus an optional photo of the tag ──
const DATA_TAG_ITEMS = [
  { id:"dtFridge", label:"Refrigerator / Freezer", desc:"Model & serial number from the data tag inside the unit" },
  { id:"dtStove",  label:"Stove / Oven",           desc:"Model & serial number from the data tag" },
  { id:"dtWasher", label:"Washing Machine",         desc:"Model & serial number from the data tag" },
  { id:"dtDryer",  label:"Dryer",                   desc:"Model & serial number from the data tag" },
  { id:"dtHVAC",   label:"HVAC / AC Unit (if applicable)", desc:"Model & serial number from the data tag, if present" },
];
DATA_TAG_ITEMS.forEach(it => {
  state[it.id] = { note: '', photos: [] };
});

function renderChecklist() {
  const main = document.getElementById('checklist');
  main.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.style.animationDelay = (si * 0.06) + 's';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span class="section-title">${sec.title}</span><span class="section-count" id="sc-${si}"></span>`;
    div.appendChild(hdr);

    sec.items.forEach(it => {
      const item = document.createElement('div');
      item.className = 'item';
      item.id = 'item-' + it.id;

      item.innerHTML = `
        <div class="item-top" onclick="cycleStatus('${it.id}')">
          <div class="status-btn" id="btn-${it.id}">
            <span id="icon-${it.id}"></span>
          </div>
          <div class="item-content">
            <div class="item-label">${it.label}</div>
            <div class="item-desc">${it.desc}</div>
            <div class="item-actions" onclick="event.stopPropagation()">
              <button class="btn-pass"  onclick="setStatus('${it.id}','pass')">✓ Pass</button>
              <button class="btn-flag"  onclick="setStatus('${it.id}','flag')">! Issue</button>
              <button class="btn-clear" onclick="setStatus('${it.id}','empty')">Clear</button>
            </div>
            <div class="note-actions" onclick="event.stopPropagation()">
              <span class="note-toggle" id="nt-${it.id}" onclick="toggleNote('${it.id}')">+ Add note</span>
              <span class="photo-toggle" onclick="triggerCamera('${it.id}')">📷 Add photo</span>
            </div>
          </div>
        </div>
        <div class="item-note-wrap" id="note-wrap-${it.id}">
          <textarea id="note-${it.id}" placeholder="Add a note or description…" oninput="saveNote('${it.id}', this.value)"></textarea>
          <div class="photo-grid" id="photos-${it.id}"></div>
        </div>
        <input type="file" accept="image/*" id="cam-${it.id}" style="display:none" onchange="handlePhoto('${it.id}', this)"/>
      `;
      div.appendChild(item);
    });

    main.appendChild(div);
  });

  // ── Data Tags section ──
  const dtDiv = document.createElement('div');
  dtDiv.className = 'section';
  dtDiv.style.animationDelay = (SECTIONS.length * 0.06) + 's';
  dtDiv.innerHTML = `<div class="section-header"><span class="section-title">7. Appliance Data Tags</span></div>`;

  DATA_TAG_ITEMS.forEach(it => {
    const row = document.createElement('div');
    row.className = 'item';
    row.id = 'item-' + it.id;
    row.innerHTML = `
      <div class="item-top" style="cursor:default;">
        <div class="item-content" style="width:100%;">
          <div class="item-label">${it.label}</div>
          <div class="item-desc">${it.desc}</div>
          <input type="text" class="tag-input" id="tag-${it.id}" placeholder="e.g. Model# ABC-123, Serial# XYZ-789" oninput="saveNote('${it.id}', this.value)"/>
          <div class="note-actions">
            <span class="photo-toggle" onclick="triggerCamera('${it.id}')">📷 Photo of tag</span>
          </div>
          <div class="photo-grid" id="photos-${it.id}"></div>
        </div>
      </div>
      <input type="file" accept="image/*" id="cam-${it.id}" style="display:none" onchange="handlePhoto('${it.id}', this)"/>
    `;
    dtDiv.appendChild(row);
  });

  main.appendChild(dtDiv);

  updateAll();
}

function cycleStatus(id) {
  const cur = state[id].status;
  const next = cur === 'empty' ? 'pass' : cur === 'pass' ? 'flag' : 'empty';
  setStatus(id, next);
}

function setStatus(id, status) {
  state[id].status = status;
  const item = document.getElementById('item-' + id);
  item.className = 'item ' + (status !== 'empty' ? status : '');
  const icon = document.getElementById('icon-' + id);
  icon.textContent = status === 'pass' ? '✓' : status === 'flag' ? '!' : '';
  // auto-show note wrap on flag and open camera
  if (status === 'flag') {
    document.getElementById('note-wrap-' + id).classList.add('show');
    document.getElementById('note-' + id).focus();
    setTimeout(() => document.getElementById('cam-' + id).click(), 300);
  }
  updateAll();
}

function toggleNote(id) {
  const wrap = document.getElementById('note-wrap-' + id);
  const tog  = document.getElementById('nt-' + id);
  const showing = wrap.classList.toggle('show');
  tog.textContent = showing ? '− Hide note' : '+ Add note';
  if (showing) document.getElementById('note-' + id).focus();
}

function triggerCamera(id) {
  const wrap = document.getElementById('note-wrap-' + id);
  if (wrap) wrap.classList.add('show');
  document.getElementById('cam-' + id).click();
}

function handlePhoto(id, input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    compressImage(e.target.result, 1280, 0.72).then(compressed => {
      if (!state[id].photos) state[id].photos = [];
      state[id].photos.push(compressed);
      renderPhotos(id);
    });
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ── Resize + compress a photo (camera images can be several MB; this keeps
// the checklist fast to build/send while the photo stays perfectly legible) ──
function compressImage(dataUrl, maxDim, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
        else { w = Math.round(w * (maxDim / h)); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      try {
        resolve(canvas.toDataURL('image/jpeg', quality));
      } catch (e) {
        resolve(dataUrl); // fall back to original if canvas export fails
      }
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function renderPhotos(id) {
  const grid = document.getElementById('photos-' + id);
  if (!grid) return;
  grid.innerHTML = '';
  (state[id].photos || []).forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb';
    wrap.innerHTML = `
      <img src="${src}" onclick="viewPhoto('${id}',${i})"/>
      <button class="photo-del" onclick="deletePhoto('${id}',${i})">×</button>
    `;
    grid.appendChild(wrap);
  });
}

function deletePhoto(id, i) {
  state[id].photos.splice(i, 1);
  renderPhotos(id);
}

function viewPhoto(id, i) {
  const src = state[id].photos[i];
  const overlay = document.getElementById('photoOverlay');
  document.getElementById('photoFull').src = src;
  document.getElementById('photoDownload').href = src;
  document.getElementById('photoDownload').download = `clearsky-${id}-photo${i+1}.jpg`;
  overlay.classList.add('show');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('photoOverlay')) {
    document.getElementById('photoOverlay').classList.remove('show');
  }
}

function saveNote(id, val) {
  state[id].note = val;
}

function updateAll() {
  let pass = 0, flag = 0;
  SECTIONS.forEach((sec, si) => {
    let sp = 0, sf = 0;
    sec.items.forEach(it => {
      if (state[it.id].status === 'pass') { pass++; sp++; }
      if (state[it.id].status === 'flag') { flag++; sf++; }
    });
    const sc = document.getElementById('sc-' + si);
    if (sc) {
      const done = sp + sf;
      sc.textContent = done > 0 ? `${done}/${sec.items.length}` : '';
    }
  });
  const empty = TOTAL - pass - flag;
  document.getElementById('countPass').textContent  = pass;
  document.getElementById('countFlag').textContent  = flag;
  document.getElementById('countEmpty').textContent = empty;
  const pct = Math.round(((pass + flag) / TOTAL) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${pass + flag} / ${TOTAL} complete`;
}

function buildReportHTML(meta) {
  let html = `
    <div class="report-section">
      <div class="report-section-title">Inspection Details</div>
      <div class="report-item"><span class="report-status">📍</span><div><div class="report-item-label">${meta.address}, Unit ${meta.unit}</div><div class="report-item-note">Inspector: ${meta.inspector} &nbsp;·&nbsp; Date: ${meta.date}</div></div></div>
    </div>
  `;

  SECTIONS.forEach(sec => {
    const flagged = sec.items.filter(it => state[it.id].status === 'flag');
    const passed  = sec.items.filter(it => state[it.id].status === 'pass');
    const pending = sec.items.filter(it => state[it.id].status === 'empty');

    html += `<div class="report-section"><div class="report-section-title">${sec.title}</div>`;

    if (flagged.length) {
      flagged.forEach(it => {
        const photos = state[it.id].photos || [];
        const photoHtml = photos.length ? `
          <div class="report-photo-grid">
            ${photos.map((src, i) => `
              <div class="report-photo-wrap">
                <img src="${src}" class="report-photo" onclick="viewPhoto('${it.id}',${i})" title="Click to enlarge"/>
                <a href="${src}" download="clearsky-${it.id}-photo${i+1}.jpg" class="report-photo-dl">⬇ Download</a>
              </div>
            `).join('')}
          </div>` : '';
        html += `<div class="report-item">
          <span class="report-status" style="color:#b83232">!</span>
          <div style="flex:1">
            <div class="report-item-label" style="color:#b83232">${it.label}</div>
            ${state[it.id].note ? `<div class="report-item-note">${state[it.id].note}</div>` : ''}
            ${photoHtml}
          </div>
        </div>`;
      });
    }
    passed.forEach(it => {
      html += `<div class="report-item">
        <span class="report-status" style="color:#1a6b3c">✓</span>
        <div>
          <div class="report-item-label">${it.label}</div>
          ${state[it.id].note ? `<div class="report-item-note">${state[it.id].note}</div>` : ''}
        </div>
      </div>`;
    });
    pending.forEach(it => {
      html += `<div class="report-item">
        <span class="report-status" style="color:#9e9b96">□</span>
        <div><div class="report-item-label" style="color:#9e9b96">${it.label}</div></div>
      </div>`;
    });

    if (!flagged.length && !passed.length && !pending.length) {
      html += `<div class="report-empty">No items recorded.</div>`;
    }
    html += `</div>`;
  });

  html += `<div class="report-section"><div class="report-section-title">7. Appliance Data Tags</div>`;
  DATA_TAG_ITEMS.forEach(it => {
    const s = state[it.id];
    const tagText = (s.note && s.note.trim()) ? s.note.trim() : 'Not recorded';
    const photos = s.photos || [];
    const photoHtml = photos.length ? `
      <div class="report-photo-grid">
        ${photos.map((src, i) => `
          <div class="report-photo-wrap">
            <img src="${src}" class="report-photo" onclick="viewPhoto('${it.id}',${i})" title="Click to enlarge"/>
            <a href="${src}" download="clearsky-${it.id}-photo${i+1}.jpg" class="report-photo-dl">⬇ Download</a>
          </div>
        `).join('')}
      </div>` : '';
    html += `<div class="report-item">
      <span class="report-status">🏷️</span>
      <div style="flex:1">
        <div class="report-item-label">${it.label}</div>
        <div class="report-item-note">${tagText}</div>
        ${photoHtml}
      </div>
    </div>`;
  });
  html += `</div>`;

  return html;
}

function showReport() {
  const meta = getReportMeta();
  document.getElementById('reportContent').innerHTML = buildReportHTML(meta);
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ── Gather property + inspection details used by both the email body and the PDF ──
function getReportMeta() {
  const inspector = document.getElementById('inspector').value || 'Not specified';
  const address   = document.getElementById('propAddress').value || 'Not specified';
  const unit      = document.getElementById('propUnit').value || 'Not specified';
  const date = document.getElementById('inspDate').value
    ? new Date(document.getElementById('inspDate').value + 'T12:00:00').toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})
    : 'Not specified';
  return { inspector, address, unit, date };
}

// ── Build a plain-text summary of the checklist for the email body ──
function buildEmailBody(meta) {
  let lines = [];
  lines.push(`PROPERTY: ${meta.address}, Unit ${meta.unit}`);
  lines.push(`INSPECTOR: ${meta.inspector}`);
  lines.push(`DATE: ${meta.date}`);
  lines.push('');

  let totalFlags = 0;

  SECTIONS.forEach(sec => {
    lines.push(`--- ${sec.title} ---`);
    sec.items.forEach(it => {
      const s = state[it.id];
      const mark = s.status === 'pass' ? '[PASS]' : s.status === 'flag' ? '[ISSUE]' : '[PENDING]';
      if (s.status === 'flag') totalFlags++;
      let line = `${mark} ${it.label}`;
      if (s.note) line += ` — Note: ${s.note}`;
      lines.push(line);
    });
    lines.push('');
  });

  lines.push('--- 7. Appliance Data Tags ---');
  DATA_TAG_ITEMS.forEach(it => {
    const s = state[it.id];
    const tagText = (s.note && s.note.trim()) ? s.note.trim() : 'Not recorded';
    lines.push(`${it.label}: ${tagText}`);
  });
  lines.push('');

  lines.push('Full details, notes, and photos are included in the attached PDF.');

  return { text: lines.join('\n'), flags: totalFlags };
}

// ── Collect every photo in the checklist (inspection items + data tags) with a label ──
function collectAllPhotos() {
  const photos = [];
  SECTIONS.forEach(sec => sec.items.forEach(it => {
    (state[it.id].photos || []).forEach((src, i) => {
      photos.push({ label: `${it.label}${(state[it.id].photos.length > 1) ? ' (' + (i+1) + ')' : ''}`, src });
    });
  }));
  DATA_TAG_ITEMS.forEach(it => {
    (state[it.id].photos || []).forEach((src, i) => {
      photos.push({ label: `${it.label} — Data Tag${(state[it.id].photos.length > 1) ? ' (' + (i+1) + ')' : ''}`, src });
    });
  });
  return photos;
}

function loadImageDimensions(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ width: img.naturalWidth || 1, height: img.naturalHeight || 1 });
    img.onerror = () => resolve({ width: 1, height: 1 });
    img.src = src;
  });
}

// ── Add a "Photos" appendix with real, individually embedded images ──
// (as opposed to the flattened report screenshot) so each photo can be
// extracted/saved from the PDF in most PDF readers.
async function addPhotoAppendix(doc, photos) {
  const marginX = 40;
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const maxImgWidth = pageWidth - marginX * 2;
  const maxImgHeight = 320;

  doc.addPage();
  let y = 50;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text('Photos', marginX, y);
  y += 10;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(130, 130, 130);
  doc.text('Right-click (or press-and-hold) any photo below to save it individually.', marginX, y + 12);
  doc.setTextColor(20, 20, 20);
  y += 34;

  // Load all photo dimensions in parallel first (much faster than one-by-one)
  const dimsList = await Promise.all(photos.map(p => loadImageDimensions(p.src)));

  photos.forEach((p, idx) => {
    const dims = dimsList[idx];
    const scale = Math.min(maxImgWidth / dims.width, maxImgHeight / dims.height, 1);
    const w = dims.width * scale;
    const h = dims.height * scale;

    if (y + h + 34 > pageHeight - 40) {
      doc.addPage();
      y = 50;
    }

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text(p.label, marginX, y);
    y += 14;

    let format = p.src.indexOf('image/png') !== -1 ? 'PNG' : 'JPEG';
    try {
      doc.addImage(p.src, format, marginX, y, w, h);
    } catch (e) {
      try { doc.addImage(p.src, format === 'JPEG' ? 'PNG' : 'JPEG', marginX, y, w, h); } catch (e2) { /* skip unreadable image */ }
    }
    y += h + 24;
  });
}

// ── Build a branded, styled PDF that matches the on-screen report design ──
// Renders the same markup/CSS used by "View Report" into a hidden container,
// captures it as an image with html2canvas, then slices it across PDF pages.
// A "Photos" appendix with real embedded (downloadable) images is added at the end.
async function capturePdfBase64(meta) {
  const width = 650; // px, matches a comfortable reading width for the report styles

  const wrap = document.createElement('div');
  wrap.style.position = 'fixed';
  wrap.style.left = '-9999px';
  wrap.style.top = '0';
  wrap.style.width = width + 'px';
  wrap.style.background = '#ffffff';
  wrap.style.padding = '0';

  wrap.innerHTML = `
    <div style="background:#0a0a0a;padding:20px 28px;">
      <div style="display:flex;align-items:center;gap:0;">
        <span style="font-family:'Montserrat',sans-serif;font-weight:500;font-size:22px;color:#ffffff;letter-spacing:2px;text-transform:uppercase;">CLEAR</span><span style="font-family:'Montserrat',sans-serif;font-weight:500;font-size:22px;color:#0a0a0a;background:#ffffff;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;margin-left:2px;">SKY</span>
      </div>
      <div style="font-family:'Montserrat',sans-serif;font-weight:300;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-top:6px;">I N V E S T M E N T &nbsp; G R O U P</div>
    </div>
    <div style="padding:24px 28px 36px;font-family:'DM Sans',sans-serif;">
      <div style="font-family:'DM Sans',sans-serif;font-size:22px;font-weight:700;color:#0a0a0a;margin-bottom:18px;">Walkthrough Report</div>
      <div id="pdfReportContent"></div>
    </div>
  `;
  document.body.appendChild(wrap);
  wrap.querySelector('#pdfReportContent').innerHTML = buildReportHTML(meta);

  try {
    // Give web fonts / layout a brief moment to settle before capturing
    await new Promise(r => setTimeout(r, 50));
    const canvas = await html2canvas(wrap, { scale: 1.5, useCORS: true, backgroundColor: '#ffffff' });
    document.body.removeChild(wrap);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });
    const pdfWidth = doc.internal.pageSize.getWidth();
    const pdfPageHeight = doc.internal.pageSize.getHeight();
    const imgHeight = (canvas.height * pdfWidth) / canvas.width;

    const imgData = canvas.toDataURL('image/png');
    let heightLeft = imgHeight;
    let position = 0;

    doc.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
    heightLeft -= pdfPageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      doc.addPage();
      doc.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
      heightLeft -= pdfPageHeight;
    }

    const photos = collectAllPhotos();
    if (photos.length) {
      await addPhotoAppendix(doc, photos);
    }

    return doc.output('datauristring').split(',')[1]; // base64 only
  } catch (err) {
    if (wrap.parentNode) document.body.removeChild(wrap);
    throw err;
  }
}

let toastTimer = null;
function showToast(message, type) {
  const toast = document.getElementById('toast');
  if (!toast) { alert(message); return; }
  toast.textContent = message;
  toast.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 7000);
}

function sendEmailReport() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    alert('Email sending is not set up yet. Paste your Google Apps Script Web App URL into APPS_SCRIPT_URL near the top of this file.');
    return;
  }

  const btns = [document.getElementById('emailBtn'), document.getElementById('emailBtnModal')].filter(Boolean);
  const statusEl = document.getElementById('emailStatus');
  btns.forEach(b => { b.disabled = true; b.textContent = 'Building PDF…'; });
  if (statusEl) { statusEl.textContent = 'Building PDF…'; statusEl.className = 'email-status show ok'; }
  showToast('Building PDF…', 'ok');

  const meta = getReportMeta();
  const { text, flags } = buildEmailBody(meta);
  const subject = `Walkthrough Checklist — ${meta.address}, Unit ${meta.unit}${flags > 0 ? ` (${flags} issue${flags > 1 ? 's' : ''} flagged)` : ''}`;

  capturePdfBase64(meta)
    .then(pdfBase64 => {
      console.log('[ClearSky] PDF built, size (base64 chars):', pdfBase64.length);
      btns.forEach(b => { b.textContent = 'Sending…'; });
      if (statusEl) { statusEl.textContent = 'Sending email…'; }
      showToast('Sending email…', 'ok');

      // Abort and show an error instead of hanging forever if the network/script stalls
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 60000);

      return fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
        signal: controller.signal,
        body: JSON.stringify({
          to: MAINTENANCE_EMAIL,
          subject: subject,
          message: text,
          pdfBase64: pdfBase64
        })
      }).finally(() => clearTimeout(timeoutId));
    })
    .then(r => {
      console.log('[ClearSky] Apps Script HTTP status:', r.status);
      return r.text().then(rawText => {
        console.log('[ClearSky] Apps Script raw response:', rawText);
        try {
          return JSON.parse(rawText);
        } catch (e) {
          throw new Error('Server did not return valid JSON (likely an Apps Script auth/deployment issue). Raw response logged to console.');
        }
      });
    })
    .then(res => {
      btns.forEach(b => { b.disabled = false; b.textContent = '✉ Email Maintenance'; });
      if (res && res.success) {
        if (statusEl) { statusEl.textContent = 'Report emailed to maintenance@findrealestate.com ✓'; statusEl.className = 'email-status show ok'; }
        showToast('Report emailed to maintenance@findrealestate.com ✓', 'ok');
      } else {
        throw new Error((res && res.error) || 'Unknown error');
      }
    })
    .catch(err => {
      console.error('[ClearSky] sendEmailReport failed:', err);
      btns.forEach(b => { b.disabled = false; b.textContent = '✉ Email Maintenance'; });
      const timedOut = err.name === 'AbortError';
      const msg = timedOut
        ? 'This is taking too long (over 60s) — cancelled. Please try again, or use "Save as PDF" and send it manually.'
        : 'Could not send the email automatically: ' + err.message;
      if (statusEl) { statusEl.textContent = msg; statusEl.className = 'email-status show err'; }
      showToast(msg, 'err');
    });
}
